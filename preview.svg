<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="30%" r="50%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.04)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.08)"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>
  
  <rect width="800" height="600" fill="url(#bg)"/>
  <rect width="800" height="600" fill="url(#glow)"/>
  
  <!-- decorative circles -->
  <circle cx="400" cy="180" r="220" fill="none" stroke="rgba(255,255,255,0.015)" stroke-width="1"/>
  <circle cx="400" cy="180" r="160" fill="none" stroke="rgba(255,255,255,0.015)" stroke-width="1"/>
  
  <!-- laptop icon -->
  <rect x="335" y="80" width="130" height="90" rx="8" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1.2"/>
  <rect x="343" y="100" width="114" height="45" rx="3" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/>
  <line x1="343" y1="100" x2="457" y2="100" stroke="rgba(255,255,255,0.05)" stroke-width="3" stroke-linecap="round"/>
  <line x1="355" y1="115" x2="445" y2="115" stroke="rgba(255,255,255,0.03)" stroke-width="2" stroke-linecap="round"/>
  <line x1="375" y1="125" x2="425" y2="125" stroke="rgba(255,255,255,0.03)" stroke-width="2" stroke-linecap="round"/>
  <line x1="380" y1="170" x2="420" y2="170" stroke="rgba(255,255,255,0.06)" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- phone icon -->
  <rect x="385" y="60" width="30" height="55" rx="5" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.8"/>
  <circle cx="400" cy="110" r="3" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/>
  
  <!-- FOMIN PROD -->
  <text x="400" y="280" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="56" font-weight="900" letter-spacing="-2" fill="white">FOMIN PROD</text>
  <text x="400" y="315" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="500" letter-spacing="12" fill="rgba(255,255,255,0.15)">ВЕБ-РАЗРАБОТКА</text>
  
  <rect x="250" y="340" width="300" height="1" fill="url(#line)"/>
  
  <!-- Start -->
  <rect x="55" y="380" width="200" height="100" rx="14" fill="rgba(255,255,255,0.01)" stroke="rgba(255,255,255,0.04)" stroke-width="0.8"/>
  <text x="155" y="415" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" letter-spacing="3" fill="rgba(255,255,255,0.25)">СТАРТ</text>
  <text x="155" y="450" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="24" font-weight="800" fill="white">5 000 ₽</text>
  
  
  <!-- Optimal -->
  <rect x="300" y="380" width="200" height="100" rx="14" fill="rgba(255,255,255,0.015)" stroke="rgba(255,255,255,0.08)" stroke-width="0.8"/>
  <text x="400" y="415" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" letter-spacing="3" fill="rgba(255,255,255,0.25)">ОПТИМА</text>
  <text x="400" y="450" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="24" font-weight="800" fill="white">10 000 ₽</text>
  
  <!-- Premium -->
  <rect x="545" y="380" width="200" height="100" rx="14" fill="rgba(255,255,255,0.01)" stroke="rgba(255,255,255,0.04)" stroke-width="0.8"/>
  <text x="645" y="415" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" letter-spacing="3" fill="rgba(255,255,255,0.25)">ПРЕМИУМ</text>
  <text x="645" y="450" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="24" font-weight="800" fill="white">15 000 ₽</text>
  
  <!-- bottom button -->
  <rect x="300" y="510" width="200" height="36" rx="18" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="400" y="533" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.4)">Заказать → @vfominq</text>
  
  <!-- url -->
  <text x="400" y="580" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="10" letter-spacing="2" fill="rgba(255,255,255,0.08)">IBANIFACII-DROID.GITHUB.IO/FOMIN-PROD</text>
