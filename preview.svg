<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#070707"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.035)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="accent" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.06)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="divider" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.06)"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.025)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.005)"/>
    </linearGradient>
  </defs>
  
  <rect width="800" height="600" fill="url(#bg)"/>
  <rect width="800" height="600" fill="url(#glow)"/>
  
  <!-- decorative elements -->
  <circle cx="400" cy="160" r="240" fill="none" stroke="rgba(255,255,255,0.012)" stroke-width="0.8"/>
  <circle cx="400" cy="160" r="180" fill="none" stroke="rgba(255,255,255,0.008)" stroke-width="0.5"/>
  
  <!-- top gradient orb -->
  <circle cx="400" cy="120" r="100" fill="url(#accent)"/>
  
  <!-- device mockup area -->
  <g opacity="0.5">
    <rect x="320" y="45" width="160" height="110" rx="10" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    <rect x="328" y="65" width="144" height="55" rx="3" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="0.5"/>
    <line x1="328" y1="65" x2="472" y2="65" stroke="rgba(255,255,255,0.04)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="340" y1="80" x2="460" y2="80" stroke="rgba(255,255,255,0.02)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="360" y1="90" x2="440" y2="90" stroke="rgba(255,255,255,0.02)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="375" y1="155" x2="425" y2="155" stroke="rgba(255,255,255,0.05)" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Tagline -->
  <text x="400" y="260" text-anchor="middle" font-family="'Segoe UI',system-ui,Arial,sans-serif" font-size="11" font-weight="600" letter-spacing="6" fill="rgba(255,255,255,0.2)">ВЕБ-РАЗРАБОТКА</text>
  
  <!-- Brand -->
  <text x="400" y="310" text-anchor="middle" font-family="'Segoe UI',system-ui,Arial,sans-serif" font-size="58" font-weight="900" letter-spacing="-2" fill="white">FOMIN PROD</text>
  
  <!-- Subtitle -->
  <text x="400" y="345" text-anchor="middle" font-family="'Segoe UI',system-ui,Arial,sans-serif" font-size="14" font-weight="400" fill="rgba(255,255,255,0.3)">Сайты, которые продают — под ключ</text>
  
  <!-- Divider -->
  <rect x="300" y="365" width="200" height="1" fill="url(#divider)"/>
  
  <!-- Pricing cards -->
  <!-- Start -->
  <rect x="55" y="390" width="200" height="108" rx="16" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.04)" stroke-width="0.8"/>
  <text x="155" y="425" text-anchor="middle" font-family="'Segoe UI',system-ui,Arial,sans-serif" font-size="10" font-weight="600" letter-spacing="4" fill="rgba(255,255,255,0.2)">СТАРТ</text>
  <text x="155" y="455" text-anchor="middle" font-family="'Segoe UI',system-ui,Arial,sans-serif" font-size="26" font-weight="800" fill="white">5 000 ₽</text>
  <text x="155" y="480" text-anchor="middle" font-family="'Segoe UI',system-ui,Arial,sans-serif" font-size="10" font-weight="400" fill="rgba(255,255,255,0.15)">лендинг / 3 дня</text>
  
  <!-- Optima -->
  <rect x="300" y="390" width="200" height="108" rx="16" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.08)" stroke-width="0.8"/>
  <text x="400" y="425" text-anchor="middle" font-family="'Segoe UI',system-ui,Arial,sans-serif" font-size="10" font-weight="600" letter-spacing="4" fill="rgba(255,255,255,0.25)">ОПТИМА</text>
  <text x="400" y="455" text-anchor="middle" font-family="'Segoe UI',system-ui,Arial,sans-serif" font-size="26" font-weight="800" fill="white">10 000 ₽</text>
  <text x="400" y="480" text-anchor="middle" font-family="'Segoe UI',system-ui,Arial,sans-serif" font-size="10" font-weight="400" fill="rgba(255,255,255,0.15)">многостраничный / 7 дней</text>
  
  <!-- Premium -->
  <rect x="545" y="390" width="200" height="108" rx="16" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.04)" stroke-width="0.8"/>
  <text x="645" y="425" text-anchor="middle" font-family="'Segoe UI',system-ui,Arial,sans-serif" font-size="10" font-weight="600" letter-spacing="4" fill="rgba(255,255,255,0.2)">ПРЕМИУМ</text>
  <text x="645" y="455" text-anchor="middle" font-family="'Segoe UI',system-ui,Arial,sans-serif" font-size="26" font-weight="800" fill="white">15 000 ₽</text>
  <text x="645" y="480" text-anchor="middle" font-family="'Segoe UI',system-ui,Arial,sans-serif" font-size="10" font-weight="400" fill="rgba(255,255,255,0.15)">под ключ / до 14 дней</text>
  
  <!-- Guarantee strip -->
  <text x="400" y="530" text-anchor="middle" font-family="'Segoe UI',system-ui,Arial,sans-serif" font-size="11" font-weight="400" fill="rgba(255,255,255,0.15)">
    <tspan>Договор  ·  Предоплата 50%  ·  Бесплатные правки</tspan>
  </text>
  
  <!-- CTA -->
  <rect x="290" y="548" width="220" height="34" rx="17" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="0.8"/>
  <text x="400" y="570" text-anchor="middle" font-family="'Segoe UI',system-ui,Arial,sans-serif" font-size="12" font-weight="600" fill="rgba(255,255,255,0.35)">Заказать → @vfominq</text>
</svg>