<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f5f5f0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.8)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="50%" stop-color="rgba(0,0,0,0.04)"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="rgba(0,0,0,0.03)"/>
    </filter>
    <filter id="shadowLight">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="rgba(0,0,0,0.02)"/>
    </filter>
  </defs>
  
  <rect width="800" height="600" fill="url(#bg)"/>
  <rect width="800" height="600" fill="url(#glow)"/>
  
  <!-- Corner accents -->
  <rect x="0" y="0" width="1" height="200" fill="rgba(0,0,0,0.04)"/>
  <rect x="0" y="0" width="200" height="1" fill="rgba(0,0,0,0.04)"/>
  <rect x="799" y="0" width="1" height="200" fill="rgba(0,0,0,0.04)"/>
  <rect x="600" y="0" width="200" height="1" fill="rgba(0,0,0,0.04)"/>
  <rect x="0" y="599" width="1" height="200" fill="rgba(0,0,0,0.04)"/>
  <rect x="0" y="400" width="200" height="1" fill="rgba(0,0,0,0.04)"/>
  <rect x="799" y="599" width="1" height="200" fill="rgba(0,0,0,0.04)"/>
  <rect x="600" y="400" width="200" height="1" fill="rgba(0,0,0,0.04)"/>
  
  <!-- Subtle decorative dot -->
  <circle cx="400" cy="120" r="3" fill="rgba(0,0,0,0.04)"/>
  
  <!-- Tag -->
  <rect x="340" y="150" width="120" height="26" rx="13" fill="rgba(0,0,0,0.03)" stroke="rgba(0,0,0,0.04)" stroke-width="0.5"/>
  <text x="400" y="168" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="9" font-weight="600" letter-spacing="4" fill="rgba(0,0,0,0.2)">ВЕБ-РАЗРАБОТКА</text>
  
  <!-- Main brand -->
  <text x="400" y="240" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="72" font-weight="900" letter-spacing="-4" fill="#111">FOMIN</text>
  <text x="400" y="300" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="72" font-weight="200" letter-spacing="6" fill="#222">PROD</text>
  
  <!-- Divider -->
  <rect x="350" y="320" width="100" height="1" fill="url(#line)"/>
  
  <!-- Description -->
  <text x="400" y="350" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="12" font-weight="400" fill="rgba(0,0,0,0.25)">Сайты под ключ для вашего бизнеса</text>
  
  <!-- Pricing row -->
  <g filter="url(#shadowLight)">
    <rect x="45" y="385" width="220" height="105" rx="12" fill="white" stroke="rgba(0,0,0,0.04)" stroke-width="0.5"/>
    <text x="155" y="420" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="8" font-weight="600" letter-spacing="4" fill="rgba(0,0,0,0.15)">СТАРТ</text>
    <text x="155" y="455" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="28" font-weight="800" fill="#111">5 000 ₽</text>
    <text x="155" y="475" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="9" font-weight="400" fill="rgba(0,0,0,0.15)">Лендинг · 3 дня</text>
  </g>
  
  <g filter="url(#shadow)">
    <rect x="290" y="385" width="220" height="105" rx="12" fill="white" stroke="rgba(0,0,0,0.06)" stroke-width="0.5"/>
    <text x="400" y="420" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="8" font-weight="600" letter-spacing="4" fill="rgba(0,0,0,0.15)">ОПТИМА</text>
    <text x="400" y="455" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="28" font-weight="800" fill="#111">10 000 ₽</text>
    <text x="400" y="475" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="9" font-weight="400" fill="rgba(0,0,0,0.15)">Многостраничный · 7 дней</text>
  </g>
  
  <g filter="url(#shadowLight)">
    <rect x="535" y="385" width="220" height="105" rx="12" fill="white" stroke="rgba(0,0,0,0.04)" stroke-width="0.5"/>
    <text x="645" y="420" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="8" font-weight="600" letter-spacing="4" fill="rgba(0,0,0,0.15)">ПРЕМИУМ</text>
    <text x="645" y="455" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="28" font-weight="800" fill="#111">15 000 ₽</text>
    <text x="645" y="475" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="9" font-weight="400" fill="rgba(0,0,0,0.15)">Под ключ · до 14 дней</text>
  </g>
  
  <!-- Bottom info -->
  <text x="400" y="528" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="9" font-weight="400" fill="rgba(0,0,0,0.12)">
    <tspan>Договор</tspan>
    <tspan dx="12" fill="rgba(0,0,0,0.03)">·</tspan>
    <tspan dx="12">Предоплата 50%</tspan>
    <tspan dx="12" fill="rgba(0,0,0,0.03)">·</tspan>
    <tspan dx="12">Бесплатные правки</tspan>
  </text>
  
  <!-- CTA -->
  <rect x="290" y="548" width="220" height="34" rx="17" fill="#111" stroke="none"/>
  <text x="400" y="570" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="white">Связаться — @vfominq</text>
</svg>